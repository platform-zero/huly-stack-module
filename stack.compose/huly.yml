services:
  huly-cockroach:
    image: cockroachdb/cockroach:latest-v24.2
    container_name: huly-cockroach
    command: start-single-node --insecure
    restart: unless-stopped
    networks:
      caddy:
    volumes:
      - huly_cockroach:/cockroach/cockroach-data
    healthcheck:
      test: ["CMD-SHELL", "cockroach sql --insecure --host=localhost:26257 --execute='select 1' >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  huly-redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.6
    container_name: huly-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr
      - internal://0.0.0.0:9092
      - --advertise-kafka-addr
      - internal://huly-redpanda:9092
      - --pandaproxy-addr
      - internal://0.0.0.0:8082
      - --schema-registry-addr
      - internal://0.0.0.0:8081
      - --rpc-addr
      - huly-redpanda:33145
      - --advertise-rpc-addr
      - huly-redpanda:33145
      - --mode
      - dev-container
      - --smp
      - "1"
      - --default-log-level=info
    restart: unless-stopped
    networks:
      caddy:
    volumes:
      - huly_redpanda:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  huly-minio:
    image: minio/minio:latest
    container_name: huly-minio
    command: server /data --address ":9000" --console-address ":9001"
    restart: unless-stopped
    networks:
      caddy:
    environment:
      MINIO_ROOT_USER: ${HULY_MINIO_ACCESS_KEY:?HULY_MINIO_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${HULY_MINIO_SECRET_KEY:?HULY_MINIO_SECRET_KEY is required}
    volumes:
      - huly_minio:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

  huly-elastic:
    image: elasticsearch:7.14.2
    container_name: huly-elastic
    command: >
      /bin/sh -c "./bin/elasticsearch-plugin list | grep -q ingest-attachment ||
      yes | ./bin/elasticsearch-plugin install --silent ingest-attachment;
      /usr/local/bin/docker-entrypoint.sh eswrapper"
    restart: unless-stopped
    networks:
      caddy:
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: -Xms1024m -Xmx1024m
      http.cors.enabled: "true"
      http.cors.allow-origin: https://huly.${DOMAIN}
    volumes:
      - huly_elastic:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  huly-rekoni:
    image: hardcoreeng/rekoni-service:${HULY_VERSION:-v0.7.423}
    container_name: huly-rekoni
    restart: unless-stopped
    networks:
      caddy:
    environment:
      SECRET: ${HULY_SECRET:?HULY_SECRET is required}

  huly-stats:
    image: hardcoreeng/stats:${HULY_VERSION:-v0.7.423}
    container_name: huly-stats
    restart: unless-stopped
    networks:
      caddy:
    environment:
      PORT: 4900
      SERVER_SECRET: ${HULY_SECRET:?HULY_SECRET is required}

  huly-transactor:
    image: hardcoreeng/transactor:${HULY_VERSION:-v0.7.423}
    container_name: huly-transactor
    restart: unless-stopped
    networks:
      caddy:
    depends_on:
      huly-cockroach:
        condition: service_healthy
      huly-redpanda:
        condition: service_healthy
      huly-minio:
        condition: service_healthy
      huly-elastic:
        condition: service_healthy
    environment:
      SERVER_PORT: 3333
      SERVER_SECRET: ${HULY_SECRET:?HULY_SECRET is required}
      DB_URL: postgresql://root@huly-cockroach:26257/defaultdb?sslmode=disable
      STORAGE_CONFIG: minio|huly-minio?accessKey=${HULY_MINIO_ACCESS_KEY:?HULY_MINIO_ACCESS_KEY is required}&secretKey=${HULY_MINIO_SECRET_KEY:?HULY_MINIO_SECRET_KEY is required}
      FRONT_URL: https://huly.${DOMAIN}
      ACCOUNTS_URL: http://huly-account:3000
      FULLTEXT_URL: http://huly-fulltext:4700
      STATS_URL: http://huly-stats:4900
      LAST_NAME_FIRST: ${HULY_LAST_NAME_FIRST:-true}
      QUEUE_CONFIG: huly-redpanda:9092

  huly-collaborator:
    image: hardcoreeng/collaborator:${HULY_VERSION:-v0.7.423}
    container_name: huly-collaborator
    restart: unless-stopped
    networks:
      caddy:
    environment:
      COLLABORATOR_PORT: 3078
      SECRET: ${HULY_SECRET:?HULY_SECRET is required}
      ACCOUNTS_URL: http://huly-account:3000
      STATS_URL: http://huly-stats:4900
      STORAGE_CONFIG: minio|huly-minio?accessKey=${HULY_MINIO_ACCESS_KEY:?HULY_MINIO_ACCESS_KEY is required}&secretKey=${HULY_MINIO_SECRET_KEY:?HULY_MINIO_SECRET_KEY is required}

  huly-account:
    image: hardcoreeng/account:${HULY_VERSION:-v0.7.423}
    container_name: huly-account
    restart: unless-stopped
    networks:
      caddy:
    depends_on:
      huly-cockroach:
        condition: service_healthy
      huly-redpanda:
        condition: service_healthy
    environment:
      SERVER_PORT: 3000
      SERVER_SECRET: ${HULY_SECRET:?HULY_SECRET is required}
      DB_URL: postgresql://root@huly-cockroach:26257/defaultdb?sslmode=disable
      TRANSACTOR_URL: ws://huly-transactor:3333;wss://huly.${DOMAIN}/_transactor
      STORAGE_CONFIG: minio|huly-minio?accessKey=${HULY_MINIO_ACCESS_KEY:?HULY_MINIO_ACCESS_KEY is required}&secretKey=${HULY_MINIO_SECRET_KEY:?HULY_MINIO_SECRET_KEY is required}
      FRONT_URL: https://huly.${DOMAIN}
      STATS_URL: https://huly.${DOMAIN}/_stats
      MODEL_ENABLED: "*"
      ACCOUNTS_URL: https://huly.${DOMAIN}/_accounts
      ACCOUNT_PORT: 3000
      QUEUE_CONFIG: huly-redpanda:9092

  huly-workspace:
    image: hardcoreeng/workspace:${HULY_VERSION:-v0.7.423}
    container_name: huly-workspace
    restart: unless-stopped
    networks:
      caddy:
    depends_on:
      huly-cockroach:
        condition: service_healthy
      huly-redpanda:
        condition: service_healthy
    environment:
      SERVER_SECRET: ${HULY_SECRET:?HULY_SECRET is required}
      DB_URL: postgresql://root@huly-cockroach:26257/defaultdb?sslmode=disable
      TRANSACTOR_URL: ws://huly-transactor:3333;wss://huly.${DOMAIN}/_transactor
      STORAGE_CONFIG: minio|huly-minio?accessKey=${HULY_MINIO_ACCESS_KEY:?HULY_MINIO_ACCESS_KEY is required}&secretKey=${HULY_MINIO_SECRET_KEY:?HULY_MINIO_SECRET_KEY is required}
      MODEL_ENABLED: "*"
      ACCOUNTS_URL: http://huly-account:3000
      STATS_URL: http://huly-stats:4900
      QUEUE_CONFIG: huly-redpanda:9092
      ACCOUNTS_DB_URL: postgresql://root@huly-cockroach:26257/defaultdb?sslmode=disable

  huly-front:
    image: hardcoreeng/front:${HULY_VERSION:-v0.7.423}
    container_name: huly-front
    restart: unless-stopped
    networks:
      caddy:
    depends_on:
      huly-account:
        condition: service_started
      huly-transactor:
        condition: service_started
      huly-fulltext:
        condition: service_started
    environment:
      SERVER_PORT: 8080
      SERVER_SECRET: ${HULY_SECRET:?HULY_SECRET is required}
      LOVE_ENDPOINT: https://huly.${DOMAIN}/_love
      ACCOUNTS_URL: https://huly.${DOMAIN}/_accounts
      ACCOUNTS_URL_INTERNAL: http://huly-account:3000
      REKONI_URL: https://huly.${DOMAIN}/_rekoni
      CALENDAR_URL: https://huly.${DOMAIN}/_calendar
      GMAIL_URL: https://huly.${DOMAIN}/_gmail
      TELEGRAM_URL: https://huly.${DOMAIN}/_telegram
      STATS_URL: https://huly.${DOMAIN}/_stats
      UPLOAD_URL: /files
      ELASTIC_URL: http://huly-elastic:9200
      COLLABORATOR_URL: wss://huly.${DOMAIN}/_collaborator
      STORAGE_CONFIG: minio|huly-minio?accessKey=${HULY_MINIO_ACCESS_KEY:?HULY_MINIO_ACCESS_KEY is required}&secretKey=${HULY_MINIO_SECRET_KEY:?HULY_MINIO_SECRET_KEY is required}
      TITLE: ${HULY_TITLE:-Platform Zero Work}
      DEFAULT_LANGUAGE: ${HULY_DEFAULT_LANGUAGE:-en}
      LAST_NAME_FIRST: ${HULY_LAST_NAME_FIRST:-true}
      DESKTOP_UPDATES_CHANNEL: ${HULY_DESKTOP_CHANNEL:-selfhost}
      DISABLED_FEATURES: ${HULY_DISABLED_FEATURES:-auto-translate,mailboxes}
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/ || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 90s

  huly-fulltext:
    image: hardcoreeng/fulltext:${HULY_VERSION:-v0.7.423}
    container_name: huly-fulltext
    restart: unless-stopped
    networks:
      caddy:
    depends_on:
      huly-cockroach:
        condition: service_healthy
      huly-elastic:
        condition: service_healthy
    environment:
      SERVER_SECRET: ${HULY_SECRET:?HULY_SECRET is required}
      DB_URL: postgresql://root@huly-cockroach:26257/defaultdb?sslmode=disable
      FULLTEXT_DB_URL: http://huly-elastic:9200
      ELASTIC_INDEX_NAME: huly_storage_index
      STORAGE_CONFIG: minio|huly-minio?accessKey=${HULY_MINIO_ACCESS_KEY:?HULY_MINIO_ACCESS_KEY is required}&secretKey=${HULY_MINIO_SECRET_KEY:?HULY_MINIO_SECRET_KEY is required}
      REKONI_URL: http://huly-rekoni:4004
      ACCOUNTS_URL: http://huly-account:3000
      STATS_URL: http://huly-stats:4900
      QUEUE_CONFIG: huly-redpanda:9092

  huly-kvs:
    image: hardcoreeng/hulykvs:${HULY_VERSION:-v0.7.423}
    container_name: huly-kvs
    restart: unless-stopped
    networks:
      caddy:
    depends_on:
      huly-cockroach:
        condition: service_healthy
    environment:
      HULY_DB_CONNECTION: postgresql://root@huly-cockroach:26257/defaultdb?sslmode=disable
      HULY_TOKEN_SECRET: ${HULY_SECRET:?HULY_SECRET is required}

volumes:
  huly_cockroach:
  huly_redpanda:
  huly_minio:
  huly_elastic:
